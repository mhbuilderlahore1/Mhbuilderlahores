<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos — MHBuilder Lahore</title>
<meta name="description" content="Browse photos from MHBuilder Lahore's construction and design projects.">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'Segoe UI',Roboto,sans-serif; background:#1a1a1a; color:#e8e8e8; min-height:100vh; }
  .topbar { background:#202124; padding:14px 18px; border-bottom:1px solid #3c3c3c; display:flex; align-items:center; gap:12px; }
  .topbar a { color:#8ab4f8; text-decoration:none; font-size:14px; }
  h1 { font-size:18px; font-weight:700; padding:16px; }
  .photos-full {
    display:flex;
    flex-direction:column;
    gap:4px;
    padding:0 16px;
}
  .photos-full img {
    width:100%;
    height:auto;
    object-fit:contain;
    border-radius:16px;
    cursor:pointer;
    display:block;
}

  .loading { padding:40px 16px; text-align:center; color:#9aa0a6; font-size:14px; }

  #photoLightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:500; }
  #photoLightbox button.nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:26px; width:44px; height:44px; border-radius:50%; z-index:2; }
  #photoLightbox .close-btn { position:absolute; top:14px; right:14px; background:none; border:none; color:#fff; font-size:28px; z-index:2; }
  .lightbox-wrap { max-width:900px; margin:0 auto; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:50px 16px 16px; }
  .lightbox-wrap img { max-width:100%; max-height:65vh; object-fit:contain; border-radius:8px; }
  .lightbox-info { width:100%; max-width:600px; margin-top:14px; text-align:center; }
  .lightbox-info .name { font-size:16px; font-weight:700; color:#fff; margin-bottom:4px; }
  .lightbox-info .category { font-size:12px; color:#8ab4f8; margin-bottom:8px; }
  .lightbox-info .content { font-size:13px; color:#bdc1c6; line-height:1.6; }
  .share-btn { margin-top:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; font-size:12px; padding:8px 14px; border-radius:16px; }
@media (max-width:768px){

.photos-full{
    padding:0 12px 30px;
    gap:16px;
}

.photos-full img{
    width:100%;
    aspect-ratio:1/1;
}

}

@media (min-width:1200px){

.photos-full{
    max-width:1800px;
    margin:auto;
}

.photos-full img{
    width:100%;
    aspect-ratio:1/1;
}

}
</style>
</head>
<body>
<div class="topbar"><a href="index.html">‹ Back to Home</a></div>
<h1>Photos</h1>
<div class="photos-full" id="photosFullGrid">
  <div class="loading">Loading photos...</div>
</div>

<div id="photoLightbox">
  <button class="close-btn" onclick="closeLightbox()">✕</button>
  <button class="nav" style="left:6px;" onclick="lightboxNav(-1)">‹</button>
  <button class="nav" style="right:6px;" onclick="lightboxNav(1)">›</button>
  <div class="lightbox-wrap">
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-info">
      <div class="name" id="lightboxName"></div>
      <div class="category" id="lightboxCategory"></div>
      <div class="content" id="lightboxContent"></div>
      <button class="share-btn" onclick="shareCurrentPhoto()">🔗 Share</button>
    </div>
  </div>
</div>

<script>
  let allPhotosData = [];
  let lightboxIndex = 0;

  async function loadPhotos() {
    try {
      const res = await fetch('/api/photos');
      const data = await res.json();
      allPhotosData = data.photos || [];
      const grid = document.getElementById('photosFullGrid');
      if (!allPhotosData.length) { grid.innerHTML = '<div class="loading">No photos yet.</div>'; return; }
      grid.innerHTML = allPhotosData.map((p, i) =>
        `<img src="${p.image_url}" alt="${(p.content || p.name || '').replace(/"/g, '&quot;')}" loading="lazy" onclick="openLightbox(${i})">`
      ).join('');
    } catch (e) {
      document.getElementById('photosFullGrid').innerHTML = '<div class="loading">Photos could not be loaded.</div>';
    }
  }

  function openLightbox(i) {
    lightboxIndex = i;
    renderLightbox();
    document.getElementById('photoLightbox').style.display = 'block';
  }
  function closeLightbox() {
    document.getElementById('photoLightbox').style.display = 'none';
  }
  function lightboxNav(dir) {
    lightboxIndex = (lightboxIndex + dir + allPhotosData.length) % allPhotosData.length;
    renderLightbox();
  }
  function renderLightbox() {
    const p = allPhotosData[lightboxIndex];
    if (!p) return;
    document.getElementById('lightboxImg').src = p.image_url;
    document.getElementById('lightboxImg').alt = p.content || p.name || '';
    document.getElementById('lightboxName').textContent = p.name || '';
    document.getElementById('lightboxCategory').textContent = p.category ? '📁 ' + p.category : '';
    document.getElementById('lightboxContent').textContent = p.content || '';
  }
  function shareCurrentPhoto() {
    const p = allPhotosData[lightboxIndex];
    if (!p) return;
    const title = p.name || 'MHBuilder Lahore';
    const url = window.location.href.split('#')[0];
    if (navigator.share) { navigator.share({ title, url, text: p.content || '' }); }
    else { navigator.clipboard.writeText(url); alert('Link copied!'); }
  }

  loadPhotos();
</script>
</body>
</html>
