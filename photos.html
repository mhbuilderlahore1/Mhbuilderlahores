<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Photos</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:#1a1a1a;color:#fff}.topbar{padding:15px;background:#202124}.topbar a{color:#8ab4f8;text-decoration:none}h1{padding:18px}.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:16px;max-width:2200px;margin:auto}.photos-grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:14px;cursor:pointer}@media(max-width:992px){.photos-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.photos-grid{grid-template-columns:1fr}}#photoLightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95)}.lbwrap{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column}.lbwrap img{max-width:95%;max-height:80vh;object-fit:contain}.close,.prev,.next{position:absolute;background:#ffffff22;border:none;color:#fff;font-size:28px;width:48px;height:48px;border-radius:50%;cursor:pointer}.close{top:15px;right:15px}.prev{left:15px;top:50%}.next{right:15px;top:50%}.info{text-align:center;padding:15px}</style></head><body><div class='topbar'><a href='index.html'>← Back</a></div><h1>Photos</h1><div id='grid' class='photos-grid'></div><div id='photoLightbox'><button class='close' onclick='closeLB()'>×</button><button class='prev' onclick='nav(-1)'>‹</button><button class='next' onclick='nav(1)'>›</button><div class='lbwrap'><img id='lbimg'><div class='info'><h3 id='lbname'></h3><p id='lbcat'></p><p id='lbcontent'></p></div></div></div><script>let photos=[],idx=0;async function load(){const r=await fetch('/api/photos');const d=await r.json();photos=d.photos||[];grid.innerHTML=photos.map((p,i)=>`<img src="${p.image_url}" loading="lazy" onclick="openLB(${i})">`).join('')}function openLB(i){idx=i;render();photoLightbox.style.display='block'}function closeLB(){photoLightbox.style.display='none'}function nav(n){idx=(idx+n+photos.length)%photos.length;render()}function render(){let p=photos[idx];lbimg.src=p.image_url;lbname.textContent=p.name||'';lbcat.textContent=p.category||'';lbcontent.textContent=p.content||'';}load();</script></body></html>
